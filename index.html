<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PEC Energy · Program Team Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --fiord:#3E4E61;
  --fiord-dark:#2e3c4d;
  --fiord-light:#eef1f4;
  --green:#A0C93A;
  --green-dark:#8aab2e;
  --green-light:#f4f9e8;
  --ink:#1A1A1A;
  --div:#E5E5E5;
  --white:#FFFFFF;
  --muted:#6b7a8d;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:Arial,Helvetica,sans-serif;background:#f2f4f6;color:var(--ink);min-height:100vh;display:flex;flex-direction:column;}

.site-header{background:var(--fiord);}
.header-bar{display:flex;align-items:stretch;max-width:1100px;margin:0 auto;}
.header-brand{display:flex;align-items:center;gap:14px;padding:16px 24px;flex:1;}
.header-logo{width:38px;height:38px;background:var(--green);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.header-title{font-family:'Montserrat',Arial,sans-serif;font-size:18px;font-weight:700;color:var(--white);letter-spacing:0.3px;line-height:1;}

.page{max-width:1100px;margin:0 auto;padding:40px 24px 64px;flex:1;}

.tool-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;max-width:800px;margin:0 auto;}

.tool-card{background:var(--white);border:1px solid var(--div);border-radius:10px;overflow:hidden;text-decoration:none;color:inherit;display:flex;flex-direction:column;transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease;cursor:pointer;}
.tool-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(62,78,97,0.13);border-color:#b8c8d8;}
.tool-card:active{transform:translateY(-1px);}

.card-header{background:var(--fiord);padding:20px 22px 18px;display:flex;align-items:flex-start;gap:14px;}
.card-icon{width:42px;height:42px;border-radius:8px;background:rgba(160,201,58,0.18);border:1px solid rgba(160,201,58,0.35);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.card-title{font-family:'Montserrat',Arial,sans-serif;font-size:14px;font-weight:700;color:var(--white);letter-spacing:0.2px;line-height:1.3;margin-bottom:3px;}
.card-badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;padding:2px 7px;border-radius:10px;background:rgba(160,201,58,0.22);color:var(--green);border:1px solid rgba(160,201,58,0.35);}

.card-footer{padding:14px 22px;border-top:1px solid var(--div);display:flex;align-items:center;justify-content:space-between;}
.card-action{font-family:'Montserrat',Arial,sans-serif;font-size:11px;font-weight:700;color:var(--fiord);text-transform:uppercase;letter-spacing:0.8px;}
.card-arrow{width:28px;height:28px;border-radius:50%;background:var(--fiord);display:flex;align-items:center;justify-content:center;transition:background .15s,transform .15s;}
.tool-card:hover .card-arrow{background:var(--green);transform:translateX(2px);}

.site-footer{background:var(--fiord);color:rgba(255,255,255,0.45);text-align:center;padding:16px;font-size:11px;letter-spacing:0.2px;}
.site-footer strong{color:rgba(255,255,255,0.8);}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-bar">
    <div class="header-brand">
      <div class="header-logo">
        <svg viewBox="0 0 24 24" fill="none" width="22" height="22"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="white"/></svg>
      </div>
      <div class="header-title">PEC Energy Program Team Tools</div>
    </div>
  </div>
</header>

<div class="page">
  <div class="tool-grid">

    <a class="tool-card" href="DLC_Fixture_Matcher_v2.html">
      <div class="card-header">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" width="22" height="22" stroke="#A0C93A" stroke-width="1.8">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </div>
        <div>
          <div class="card-title">DLC + Energy Star Lookup</div>
          <span class="card-badge">QPL Verification</span>
        </div>
      </div>
      <div class="card-footer">
        <span class="card-action">Open Tool</span>
        <div class="card-arrow">
          <svg viewBox="0 0 24 24" fill="none" width="14" height="14" stroke="white" stroke-width="2.5">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </div>
      </div>
    </a>

    <a class="tool-card" href="electric-utility-lookup.html">
      <div class="card-header">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" width="22" height="22" stroke="#A0C93A" stroke-width="1.8">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <div>
          <div class="card-title">Utility Lookup</div>
          <span class="card-badge">Utility Programs</span>
        </div>
      </div>
      <div class="card-footer">
        <span class="card-action">Open Tool</span>
        <div class="card-arrow">
          <svg viewBox="0 0 24 24" fill="none" width="14" height="14" stroke="white" stroke-width="2.5">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </div>
      </div>
    </a>

  </div>
</div>

<footer class="site-footer">
  <strong>PEC</strong> - Energy Programs - Internal Use Only
</footer>

</body>
</html>
